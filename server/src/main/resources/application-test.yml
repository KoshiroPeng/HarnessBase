spring:
  # test 环境通过环境变量注入连接信息，避免把测试环境凭据直接写入仓库。
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/projectpilot_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
