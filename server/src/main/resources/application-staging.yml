spring:
  # staging 环境尽量贴近生产，同一份制品通过环境变量切换配置，不重新构建差异版本。
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/projectpilot_staging?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
