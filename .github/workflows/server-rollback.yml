name: Server Rollback

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "目标环境"
        required: true
        type: environment
      rollback_artifact:
        description: "目标回滚制品名称，例如 ruoyi-admin.jar"
        required: true
        type: string
      rollback_reason:
        description: "回滚原因"
        required: true
        type: string
      dry_run:
        description: "是否仅输出回滚计划，不执行真实回滚"
        required: true
        default: true
        type: boolean
      verify_base_url:
        description: "可选，回滚后验证访问地址，例如 http://example.com"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  # 中文说明：同一环境的回滚必须串行，避免多次回滚互相覆盖。
  group: server-rollback-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  approval-gate:
    name: 回滚审批门禁
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: 输出回滚摘要
        run: |
          echo "目标环境：${{ inputs.target_environment }}"
          echo "回滚制品：${{ inputs.rollback_artifact }}"
          echo "回滚原因：${{ inputs.rollback_reason }}"
          echo "Dry Run：${{ inputs.dry_run }}"

  rollback-server:
    name: 执行远端回滚
    needs: approval-gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行回滚脚本
        env:
          APP_PROFILE: ${{ vars.APP_PROFILE }}
          APP_DEPLOY_DIR: ${{ vars.APP_DEPLOY_DIR }}
          APP_DEPLOY_PORT: ${{ vars.APP_DEPLOY_PORT }}
          APP_DEPLOY_STRATEGY: ${{ vars.APP_DEPLOY_STRATEGY }}
          APP_SERVICE_NAME: ${{ vars.APP_SERVICE_NAME }}
          JAVA_OPTS: ${{ vars.JAVA_OPTS }}
          APP_DEPLOY_HOST: ${{ secrets.APP_DEPLOY_HOST }}
          APP_DEPLOY_USER: ${{ secrets.APP_DEPLOY_USER }}
          APP_DEPLOY_KEY: ${{ secrets.APP_DEPLOY_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          ROLLBACK_ARTIFACT: ${{ inputs.rollback_artifact }}
          ROLLBACK_REASON: ${{ inputs.rollback_reason }}
        run: |
          chmod +x deploy/release/rollback-via-ssh.sh
          bash deploy/release/rollback-via-ssh.sh

      - name: 输出回滚手册入口
        run: |
          {
            echo "## 回滚入口"
            echo ""
            echo "- deploy/release/rollback-via-ssh.sh"
            echo "- deploy/release/release-checklist.md"
            echo "- deploy/release/verify-release.sh"
            echo "- deploy/observability/README.md"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-rollback:
    name: 回滚后验证
    needs: rollback-server
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行验证脚本
        run: |
          chmod +x deploy/release/verify-release.sh
          TARGET_BASE_URL='${{ inputs.verify_base_url != '' && inputs.verify_base_url || vars.VERIFY_BASE_URL }}' \
          RELEASE_VERSION='rollback-${{ inputs.rollback_artifact }}' \
          TARGET_ENVIRONMENT='${{ inputs.target_environment }}' \
          DRY_RUN='${{ inputs.dry_run }}' \
          bash deploy/release/verify-release.sh
