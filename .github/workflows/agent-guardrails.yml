name: Agent Guardrails

on:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
          cache-dependency-path: server/pom.xml

      - name: Set up Maven 3.6.3
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.6.3

      - name: Verify tooling
        run: |
          java -version
          mvn -v

      - name: Build & Verify
        working-directory: server
        run: mvn -B clean verify

      - name: Architecture Check
        working-directory: server
        run: mvn -B test -Dtest='*ArchTest,LayerDependencyTest'

      - name: File Size Check
        run: |
          find server/src/main/java -name '*.java' | while read -r f; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 300 ]; then
              echo "❌ $f 有 $lines 行（上限 300）"
              echo "✅ FIX: 拆分为更小的类，将辅助方法移至 *Helper 或 infrastructure。"
              echo "📖 See: docs/conventions/file-size.md"
              exit 1
            fi
          done

      - name: Doc Freshness
        run: |
          find docs/design -name '*.md' | while read -r f; do
            last_mod=$(git log -1 --format=%ct -- "$f" 2>/dev/null || true)
            if [ -z "$last_mod" ]; then
              echo "⚠️ $f 尚未提交，跳过文档新鲜度检查"
              continue
            fi

            now=$(date +%s)
            days_old=$(((now - last_mod) / 86400))
            if [ "$days_old" -gt 60 ]; then
              echo "⚠️ $f 已 ${days_old} 天未更新，可能已过期"
            fi
          done
