name: Multi-Service CI

on:
  # 中文说明：PR 阶段执行质量门禁，阻止不符合基线的改动进入主线。
  pull_request:
    paths:
      - ".github/workflows/**"
      - "server/**"
      - "services/**"
      - "docs/**"
      - "AGENTS.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
  # 中文说明：主分支合并后再次执行 CI，并产出可追溯的构建制品元数据。
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "server/**"
      - "services/**"
      - "docs/**"
      - "AGENTS.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
  # 中文说明：允许手工触发，便于在未改动代码时验证流水线配置。
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # 中文说明：同一分支上的 CI 仅保留最新一次，减少重复排队和资源浪费。
  group: multi-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  callcenter-server:
    name: CallCenter Server 构建校验
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: services/callcenter-server/pom.xml

      - name: 校验 Java 与 Maven
        run: |
          java -version
          mvn -v

      - name: 构建 CallCenter 后端
        working-directory: services/callcenter-server
        run: mvn -B -DskipTests package

      - name: 生成构建元数据
        run: |
          mkdir -p artifacts
          {
            echo "service=callcenter-server"
            echo "git_sha=${GITHUB_SHA}"
            echo "git_ref=${GITHUB_REF}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/build-metadata.txt

      - name: 上传构建产物与报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: callcenter-server-ci-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            artifacts/**
            services/callcenter-server/**/target/*.jar
            services/callcenter-server/**/target/surefire-reports/**

  callcenter-web:
    name: CallCenter Web 构建校验
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: services/callcenter-web/pnpm-lock.yaml

      - name: 安装前端依赖
        working-directory: services/callcenter-web
        run: pnpm install --frozen-lockfile

      - name: 构建 CallCenter 前端
        working-directory: services/callcenter-web
        run: pnpm build:prod

      - name: 上传 CallCenter 前端制品
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: callcenter-web-ci-${{ github.run_number }}
          if-no-files-found: ignore
          path: services/callcenter-web/dist/**

  legacy-server:
    name: Legacy Server 兼容校验
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 1.8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
          cache-dependency-path: server/pom.xml

      - name: 设置 Maven 3.6.3
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.6.3

      - name: 校验构建工具版本
        run: |
          java -version
          mvn -v

      - name: 执行历史骨架 Maven 校验
        working-directory: server
        run: mvn -B clean verify

      - name: 执行历史骨架架构规则检查
        working-directory: server
        run: mvn -B test -Dtest='*ArchTest,LayerDependencyTest'

      - name: 执行历史骨架文件行数检查
        run: |
          find server/src/main/java -name '*.java' | while read -r f; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 300 ]; then
              echo "❌ $f 有 $lines 行（上限 300）"
              echo "✅ FIX: 拆分为更小的类，将辅助方法移至 *Helper 或 infrastructure。"
              echo "📖 See: docs/conventions/file-size.md"
              exit 1
            fi
          done

      - name: 执行设计文档新鲜度检查
        run: |
          find docs/design -name '*.md' | while read -r f; do
            last_mod=$(git log -1 --format=%ct -- "$f" 2>/dev/null || true)
            if [ -z "$last_mod" ]; then
              echo "⚠️ $f 尚未提交，跳过文档新鲜度检查"
              continue
            fi

            now=$(date +%s)
            days_old=$(((now - last_mod) / 86400))
            if [ "$days_old" -gt 60 ]; then
              echo "⚠️ $f 已 ${days_old} 天未更新，可能已过期"
            fi
          done

      - name: 上传历史骨架报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-server-ci-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            server/target/*.jar
            server/target/surefire-reports/**
            server/target/site/jacoco/**
