name: HarnessBase CI

on:
  # 中文说明：PR 阶段执行质量门禁，阻止不符合基线的改动进入主线。
  pull_request:
    paths:
      - ".github/workflows/**"
      - "server/**"
      - "web/**"
      - "docs/**"
      - "deploy/**"
      - "AGENTS.md"
      - "README.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
  # 中文说明：主分支合并后再次执行 CI，并产出可追溯的构建制品元数据。
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "server/**"
      - "web/**"
      - "docs/**"
      - "deploy/**"
      - "AGENTS.md"
      - "README.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
  # 中文说明：允许手工触发，便于在未改动代码时验证流水线配置。
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # 中文说明：同一分支上的 CI 仅保留最新一次，减少重复排队和资源浪费。
  group: harnessbase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: HarnessBase 后端构建校验
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: server/pom.xml

      - name: 校验 Java 与 Maven
        run: |
          java -version
          mvn -v

      - name: 构建 HarnessBase 后端
        working-directory: server
        run: mvn -B -DskipTests package

      - name: 生成构建元数据
        run: |
          mkdir -p artifacts
          {
            echo "service=ruoyi-admin"
            echo "git_sha=${GITHUB_SHA}"
            echo "git_ref=${GITHUB_REF}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/build-metadata.txt

      - name: 上传构建产物与报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-base-server-ci-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            artifacts/**
            server/ruoyi-admin/target/*.jar
            server/**/target/surefire-reports/**

  web:
    name: HarnessBase 前端构建校验
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: 安装前端依赖
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: 构建 HarnessBase 前端
        working-directory: web
        run: pnpm build:prod

      - name: 上传 HarnessBase 前端制品
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-base-web-ci-${{ github.run_number }}
          if-no-files-found: ignore
          path: web/dist/**
