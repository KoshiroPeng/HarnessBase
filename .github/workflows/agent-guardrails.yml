name: HarnessBase CI

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "server/**"
      - "web/**"
      - "docs/**"
      - "deploy/**"
      - "AGENTS.md"
      - "README.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "server/**"
      - "web/**"
      - "docs/**"
      - "deploy/**"
      - "AGENTS.md"
      - "README.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: harnessbase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: HarnessBase 自动化护栏校验
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 执行自动化护栏检查
        run: python .github/scripts/doc_guardrails.py

  server:
    name: HarnessBase 后端构建校验
    runs-on: ubuntu-latest
    needs: docs

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: server/pom.xml

      - name: 校验 Java 与 Maven
        run: |
          java -version
          mvn -v

      - name: 构建 HarnessBase 后端
        working-directory: server
        run: mvn -B -DskipTests package

      - name: 生成构建元数据
        run: |
          mkdir -p artifacts
          {
            echo "service_scope=microservice-backend"
            echo "git_sha=${GITHUB_SHA}"
            echo "git_ref=${GITHUB_REF}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/build-metadata.txt

      - name: 上传后端构建产物与报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-base-server-ci-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            artifacts/**
            server/ruoyi-auth/target/*.jar
            server/ruoyi-gateway/target/*.jar
            server/ruoyi-modules/**/target/*.jar
            server/ruoyi-visual/**/target/*.jar
            server/**/target/surefire-reports/**

  web:
    name: HarnessBase 前端构建校验
    runs-on: ubuntu-latest
    needs: docs

    defaults:
      run:
        shell: bash

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装前端依赖
        working-directory: web
        run: npm install

      - name: 构建 HarnessBase 前端
        working-directory: web
        run: npm run build:prod

      - name: 上传前端构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-base-web-ci-${{ github.run_number }}
          if-no-files-found: ignore
          path: web/dist/**
