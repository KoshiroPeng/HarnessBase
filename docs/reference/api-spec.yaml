openapi: 3.0.3
info:
  title: HernessDemo Admin API 摘要
  version: 0.1.0
  description: |
    本文件是当前 RuoYi-Vue-Plus 后台管理系统的仓库级 API 摘要，不替代运行时 SpringDoc 生成的完整接口文档。
    摘要只列代表性入口，完整接口应以后端 Controller 和 SpringDoc 输出为准。
servers:
  - url: /
    description: 当前后端 context-path
tags:
  - name: Auth
    description: 认证、会话、注册、租户与第三方绑定
  - name: System
    description: 用户、菜单、角色、租户等系统管理
  - name: Generator
    description: 代码生成
  - name: Workflow
    description: 工作流
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      description: 校验 clientId、grantType、租户状态后进入对应认证策略。
      responses:
        "200":
          description: 统一 R<LoginVo> 响应
  /auth/logout:
    post:
      tags: [Auth]
      summary: 用户登出
      responses:
        "200":
          description: 统一 R<Void> 响应
  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      responses:
        "200":
          description: 统一 R<Void> 响应
  /auth/tenant/list:
    get:
      tags: [Auth]
      summary: 查询登录页租户列表
      responses:
        "200":
          description: 统一 R<LoginTenantVo> 响应
  /auth/code:
    get:
      tags: [Auth]
      summary: 获取图形验证码
      responses:
        "200":
          description: 验证码响应
  /system/user/list:
    get:
      tags: [System]
      summary: 查询用户列表
      responses:
        "200":
          description: 表格分页响应
  /system/user/getInfo:
    get:
      tags: [System]
      summary: 获取当前用户信息
      responses:
        "200":
          description: 当前用户、角色与权限信息
  /system/menu/getRouters:
    get:
      tags: [System]
      summary: 获取动态路由
      responses:
        "200":
          description: 路由树响应
  /tool/gen/list:
    get:
      tags: [Generator]
      summary: 查询代码生成表列表
      responses:
        "200":
          description: 表格分页响应
  /tool/gen/preview/{tableId}:
    get:
      tags: [Generator]
      summary: 预览代码生成结果
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 代码预览响应
  /workflow/definition/list:
    get:
      tags: [Workflow]
      summary: 查询流程定义列表
      responses:
        "200":
          description: 表格分页响应
  /workflow/definition/{id}:
    get:
      tags: [Workflow]
      summary: 查询流程定义详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 流程定义详情响应
components:
  schemas:
    R:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，成功通常为 200
        msg:
          type: string
          description: 响应消息
        data:
          description: 响应数据
