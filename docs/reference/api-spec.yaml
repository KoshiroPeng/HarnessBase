openapi: 3.0.3
info:
  title: HarnessBase Admin API 摘要
  version: 0.1.0
  description: |
    本文件是当前若依微服务后台管理系统的仓库级 API 摘要，
    不替代运行时 SpringDoc 生成的完整接口文档。
servers:
  - url: /
    description: 当前后端 context-path
tags:
  - name: Auth
    description: 认证与会话
  - name: System
    description: 系统管理
  - name: Monitor
    description: 监控
  - name: Generator
    description: 代码生成
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      responses:
        "200":
          description: 登录成功
  /system/user/list:
    get:
      tags: [System]
      summary: 查询用户列表
      responses:
        "200":
          description: 查询成功
  /system/menu/getRouters:
    get:
      tags: [System]
      summary: 获取动态路由
      responses:
        "200":
          description: 查询成功
  /monitor/online/list:
    get:
      tags: [Monitor]
      summary: 查询在线用户列表
      responses:
        "200":
          description: 查询成功
  /tool/gen/list:
    get:
      tags: [Generator]
      summary: 查询代码生成表列表
      responses:
        "200":
          description: 查询成功
