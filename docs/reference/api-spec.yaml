openapi: 3.0.3
info:
  title: CallCenter API
  version: 0.1.0
  description: |
    CallCenter 呼叫中心平台 API 基线文档。
    当前文件只定义第一阶段最小契约占位；真实业务接口落地时必须同步更新。
servers:
  - url: /api/v1
    description: 默认 API 前缀
tags:
  - name: Auth
    description: 认证与会话
  - name: Agents
    description: 坐席状态
  - name: Calls
    description: 通话与 CTI 事件
  - name: ScreenPop
    description: 来电弹屏
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /agents/{agentId}/status:
    get:
      tags:
        - Agents
      summary: 查询坐席状态
      operationId: getAgentStatus
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: 坐席状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /calls/events:
    post:
      tags:
        - Calls
      summary: 接收 CTI 通话事件
      operationId: receiveCallEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallEventRequest'
      responses:
        '202':
          description: 事件已接收
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /screen-pop:
    get:
      tags:
        - ScreenPop
      summary: 查询来电弹屏上下文
      operationId: getScreenPop
      parameters:
        - name: callerNumber
          in: query
          required: true
          schema:
            type: string
            maxLength: 32
        - name: callId
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: 弹屏上下文
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenPopResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或认证已失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 资源冲突或重复事件
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          maxLength: 100
        password:
          type: string
          format: password
          maxLength: 100
    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
        displayName:
          type: string
    AgentStatusResponse:
      type: object
      required:
        - agentId
        - status
      properties:
        agentId:
          type: string
        status:
          type: string
          enum:
            - offline
            - idle
            - busy
            - ringing
            - talking
            - after_call
        updatedAt:
          type: string
          format: date-time
    CallEventRequest:
      type: object
      required:
        - eventId
        - eventType
        - callId
      properties:
        eventId:
          type: string
          maxLength: 64
        eventType:
          type: string
          enum:
            - inbound_ringing
            - answered
            - hangup
            - transferred
            - outbound_started
        callId:
          type: string
          maxLength: 64
        agentId:
          type: string
        callerNumber:
          type: string
        occurredAt:
          type: string
          format: date-time
    ScreenPopResponse:
      type: object
      required:
        - callerNumber
        - matched
      properties:
        callerNumber:
          type: string
        matched:
          type: boolean
        customerId:
          type: string
        customerName:
          type: string
        recentContactSummary:
          type: string
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
