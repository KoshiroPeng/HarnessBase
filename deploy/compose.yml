name: callcenter

services:
  mysql:
    image: mysql:8.0.42
    container_name: callcenter-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: callcenter
    ports:
      - "3306:3306"
    volumes:
      - callcenter-mysql-data:/var/lib/mysql
      - ./services/callcenter-server/script/sql/ry_vue_5.X.sql:/docker-entrypoint-initdb.d/01-ry-vue.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --explicit_defaults_for_timestamp=true
      - --lower_case_table_names=1
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2.8
    container_name: callcenter-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - callcenter-redis-data:/data
    command: ["redis-server", "--requirepass", "ruoyi123", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ruoyi123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: callcenter-minio
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: callcenter
      MINIO_ROOT_PASSWORD: callcenter123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - callcenter-minio-data:/data
    command: server --address ":9000" --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  callcenter-mysql-data:
  callcenter-redis-data:
  callcenter-minio-data:
