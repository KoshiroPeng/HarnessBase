name: callcenter

services:
  admin:
    build:
      context: ./services/callcenter-server/ruoyi-admin
    image: callcenter-admin:local
    container_name: callcenter-admin
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      JAVA_OPTS: -Xms512m -Xmx1024m
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u callcenter:123456 http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30

  web:
    build:
      context: ./services/callcenter-web
    image: callcenter-web:local
    container_name: callcenter-web
    restart: unless-stopped
    depends_on:
      admin:
        condition: service_started
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
